<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品カタログ 自動作成AI</title>
<style>
  :root{ --blue:#2563EB; --orange:#F97316; --ink:#1f2937; --grid:#d0d7de; --muted:#64748b; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; background:#f5f7fb; color:var(--ink); }
  header{ background:#fff; border-bottom:2px solid var(--blue); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .logo{ width:34px; height:34px; border-radius:8px; background:var(--blue); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; }
  header h1{ margin:0; font-size:19px; }
  header p{ margin:2px 0 0; font-size:12px; color:var(--muted); }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{ background:#eff4ff; color:var(--blue); border:1px solid #c7d7fe; border-radius:999px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  .chip.g{ background:#f1f5f9; color:#475569; border-color:var(--grid); }

  .panel{ display:none; margin:12px 24px 0; }
  .card{ background:#fff; border:1px solid var(--grid); border-radius:12px; padding:18px 20px; }
  .cc-head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .cc-name{ font-size:18px; font-weight:800; }
  .badge{ background:#fef3c7; color:#92400e; border:1px solid #fde68a; border-radius:6px; font-size:11px; font-weight:700; padding:2px 8px; }
  .cc-edit{ margin-left:auto; padding:6px 12px; font-size:12px; }
  .cc-grid{ display:grid; grid-template-columns:max-content 1fr; gap:9px 16px; margin:0 0 12px; align-items:start; }
  .cc-grid dt{ color:var(--muted); font-size:13px; padding-top:2px; }
  .cc-grid dd{ margin:0; font-size:14px; }
  .cc-label{ color:var(--muted); font-size:12px; margin-bottom:4px; }
  .cc-note{ color:#92400e; background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:10px 14px; font-size:13px; line-height:1.6; }
  .cc-input{ width:100%; border:1px solid var(--grid); border-radius:6px; padding:6px 8px; font-size:14px; font-family:inherit; }
  .cc-fic{ display:block; font-size:13px; color:#475569; margin:4px 0 10px; }
  .cc-actions{ display:flex; gap:8px; }

  main{ padding:18px 24px; }
  .input-card{ background:#fff; border:1px solid var(--grid); border-radius:14px; padding:20px 22px; margin-bottom:18px; }
  .ic-title{ font-size:15px; font-weight:700; margin:0 0 4px; }
  .ic-sub{ font-size:12px; color:var(--muted); margin:0 0 16px; }
  .pick-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:10px; }
  .pick{ display:flex; align-items:center; gap:10px; border:1px solid var(--grid); border-radius:10px; padding:10px 12px; cursor:pointer; background:#fff; }
  .pick.on{ border-color:var(--blue); background:#eff4ff; }
  .pick input{ width:17px; height:17px; accent-color:var(--blue); }
  .pick .pn{ font-size:14px; font-weight:600; }
  .pick .pc{ font-size:11px; color:var(--muted); }
  .gen-row{ margin-top:18px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .btn{ border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:700; cursor:pointer; }
  .btn-o{ background:var(--orange); color:#fff; }
  .btn-b{ background:var(--blue); color:#fff; }
  .btn-ghost{ background:#fff; color:#475569; border:1px solid var(--grid); }
  .status{ font-size:13px; color:var(--blue); }
  .status.done{ color:#16a34a; font-weight:600; }

  /* 会場で商品を追加バー */
  .addbar{ display:none; background:#fff7ed; border:1px solid #fed7aa; border-radius:12px; padding:14px 18px; margin-bottom:16px; }
  .addbar.show{ display:block; }
  .addbar h4{ margin:0 0 4px; font-size:14px; color:#9a3412; }
  .addbar .asub{ font-size:12px; color:#b45309; margin:0 0 10px; }
  .addform{ display:grid; grid-template-columns:repeat(auto-fit, minmax(190px,1fr)); gap:10px 14px; align-items:end; }
  .aff{ display:flex; flex-direction:column; gap:4px; min-width:0; }
  .aff.full{ grid-column:1/-1; }
  .aff label{ font-size:12px; color:#9a3412; font-weight:600; }
  .aff label .unit{ color:#b45309; font-weight:400; font-size:11px; }
  .aff input, .aff select{ width:100%; border:1px solid #fdba74; border-radius:8px; padding:8px 10px; font-size:14px; font-family:inherit; background:#fff; }
  .afact{ grid-column:1/-1; display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:2px; }
  .afmsg{ font-size:13px; color:#16a34a; font-weight:700; }

  .result{ display:none; }
  .result.show{ display:block; }
  .topbar{ position:sticky; top:0; z-index:5; display:flex; gap:12px; align-items:center; flex-wrap:wrap; background:#eff4ff; border:1px solid #c7d7fe; border-radius:12px; padding:12px 16px; margin-bottom:16px; }
  .topbar .tb-label{ font-weight:700; color:var(--blue); margin-right:auto; }
  .pdf-row{ display:none; margin:16px 0 0; gap:10px; }
  .pdf-row.show{ display:flex; }

  /* ===== カタログ本体 ===== */
  .catalog{ display:flex; flex-direction:column; align-items:center; gap:20px; }
  .cat-page{ width:794px; max-width:100%; background:#fff; border:1px solid var(--grid); border-radius:6px; box-shadow:0 2px 10px rgba(0,0,0,.08); padding:46px 54px; }
  .cat-page.cover{ padding:0; overflow:hidden; }
  /* 表紙 */
  .cv-hero{ position:relative; }
  .cv-hero img{ width:100%; height:392px; object-fit:cover; display:block; }
  .cv-hero .ovl{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(15,23,42,.12), rgba(15,23,42,.72)); }
  .cv-hero .cap{ position:absolute; left:54px; right:54px; bottom:30px; color:#fff; }
  .cv-hero .est{ font-size:13px; letter-spacing:.18em; opacity:.92; }
  .cv-hero .cname{ font-size:40px; font-weight:800; margin:6px 0 4px; letter-spacing:.04em; }
  .cv-hero .ind{ font-size:15px; opacity:.95; }
  .cv-body{ padding:34px 54px 46px; text-align:center; }
  .cv-motto{ font-size:30px; font-weight:800; letter-spacing:.12em; color:var(--ink); margin:0 0 10px; }
  .cv-lead{ font-size:14px; color:#475569; line-height:1.9; max-width:560px; margin:0 auto 22px; }
  .cv-tags{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .cv-tag{ background:#eff4ff; color:var(--blue); border:1px solid #c7d7fe; border-radius:999px; padding:7px 16px; font-size:13px; font-weight:700; }
  .cv-title{ display:inline-block; margin-top:26px; font-size:13px; letter-spacing:.3em; color:var(--muted); border-top:2px solid var(--blue); border-bottom:2px solid var(--blue); padding:8px 22px; }
  /* ページ見出し */
  .pg-head{ display:flex; align-items:baseline; gap:12px; border-bottom:2px solid var(--blue); padding-bottom:8px; margin:0 0 24px; }
  .pg-head .ja{ font-size:21px; font-weight:800; }
  .pg-head .en{ font-size:12px; letter-spacing:.2em; color:var(--muted); }
  .pg-foot{ margin-top:30px; padding-top:10px; border-top:1px solid var(--grid); display:flex; justify-content:space-between; font-size:11px; color:#94a3b8; }
  /* 強み */
  .str-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:22px; }
  .str{ border:1px solid var(--grid); border-radius:10px; padding:18px 16px; text-align:center; }
  .str .ico{ font-size:30px; }
  .str h3{ font-size:16px; margin:8px 0 6px; }
  .str p{ font-size:12.5px; color:#475569; line-height:1.75; margin:0; }
  .str-photo{ width:100%; height:230px; object-fit:cover; border-radius:10px; }
  .str-cap{ font-size:12px; color:var(--muted); text-align:center; margin-top:8px; }
  /* 製品ブロック */
  .prod{ display:flex; gap:24px; padding:18px 0; border-bottom:1px dashed var(--grid); }
  .prod:last-child{ border-bottom:none; }
  .prod-figure{ flex:0 0 260px; }
  .prod-photo{ width:260px; height:180px; object-fit:cover; border-radius:8px; background:#eef2f7; border:1px solid var(--grid); }
  .prod-photo.noimg{ display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:13px; }
  .prod-info{ flex:1; min-width:0; }
  .prod-name{ font-size:19px; font-weight:800; display:flex; align-items:center; gap:8px; }
  .prod-name .code{ font-size:12px; color:#fff; background:var(--blue); border-radius:5px; padding:2px 8px; vertical-align:middle; font-weight:700; }
  .prod-del{ margin-left:auto; border:1px solid #fecaca; background:#fff; color:#dc2626; border-radius:7px; padding:3px 10px; font-size:11.5px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .prod-del:hover{ background:#fef2f2; }
  .prod-lead{ font-size:13.5px; color:var(--orange); font-weight:700; margin:6px 0 4px; }
  .prod-desc{ font-size:13px; color:#475569; line-height:1.8; margin:0 0 10px; }
  table.spec{ border-collapse:collapse; width:100%; font-size:12.5px; }
  .spec th,.spec td{ border:1px solid var(--grid); padding:5px 10px; text-align:left; }
  .spec th{ background:#f1f5f9; color:#334155; font-weight:600; width:96px; white-space:nowrap; }
  /* 価格表 */
  .pricelead{ font-size:13px; color:#475569; line-height:1.8; margin:0 0 16px; }
  table.price{ border-collapse:collapse; width:100%; font-size:13.5px; }
  .price th,.price td{ border:1px solid var(--grid); padding:10px 12px; text-align:center; }
  .price thead th{ background:#eef2ff; color:#334155; }
  .price td.it{ text-align:left; font-weight:700; }
  .price td.it small{ display:block; font-weight:400; color:var(--muted); font-size:11px; }
  .price td.num{ text-align:right; font-variant-numeric:tabular-nums; }
  .price tbody tr:nth-child(even){ background:#fafbff; }
  .price-note{ font-size:11.5px; color:var(--muted); line-height:1.8; margin-top:12px; }
  /* 裏表紙 */
  .back{ text-align:center; padding-top:30px; }
  .back .bname{ font-size:26px; font-weight:800; }
  .back .bmotto{ font-size:14px; color:var(--orange); font-weight:700; margin:8px 0 24px; }
  .back-grid{ display:inline-grid; grid-template-columns:max-content 1fr; gap:8px 18px; text-align:left; font-size:13.5px; margin:0 auto 24px; }
  .back-grid dt{ color:var(--muted); }
  .back-grid dd{ margin:0; }
  .back .qr{ width:96px; height:96px; border:1px solid var(--grid); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:11px; margin:0 auto; text-align:center; }

  @page{ size:A4 portrait; margin:0; }
  @media print{
    body{ background:#fff; }
    header,.panel,.input-card,.addbar,.pdf-row,.topbar,.prod-del{ display:none !important; }
    main{ padding:0; }
    .result.show{ display:block; }
    .catalog{ gap:0; }
    .cat-page{ width:210mm; min-height:297mm; border:none; box-shadow:none; border-radius:0; padding:18mm 18mm; page-break-after:always; }
    .cat-page.cover{ padding:0; }
    .cv-hero img{ height:150mm; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">AI</div>
    <div>
      <h1>商品カタログ 自動作成AI</h1>
      <p>御社の取扱品から、商品カタログと価格表をAIが作成します</p>
    </div>
  </div>
  <div class="chips">
    <button class="chip" id="settingsBtn">⚙ 会社設定：マルワ製作所（架空） ▾</button>
    <button class="chip g" id="resetDemoBtn">🔄 デモをリセット</button>
  </div>
</header>

<div class="panel" id="settings"></div>

<main>
  <div class="input-card">
    <p class="ic-title">カタログに載せる商品を選んでください</p>
    <p class="ic-sub">御社の取扱品です。チェックした商品でカタログを作ります。</p>
    <div class="pick-grid" id="pickGrid"></div>
    <div class="gen-row">
      <button class="btn btn-o" id="genBtn">⚡ カタログを作成</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <div class="addbar" id="addbar">
    <h4>➕ 新しい商品を追加する</h4>
    <p class="asub">テンプレートを選べば全部 自動で入ります（おすすめ）。自分で入れる場合は「品名」だけ必須、ほかは わかる項目だけでOKです。</p>
    <div class="addform" id="addform"></div>
  </div>

  <div class="result" id="result">
    <div class="topbar" id="topbar">
      <span class="tb-label">✓ カタログができました</span>
      <button class="btn btn-b" id="pdfBtnTop">📄 PDFで保存・印刷する</button>
      <button class="btn btn-ghost" id="redoBtnTop">↻ 商品を選び直す</button>
    </div>
    <div class="catalog" id="catalog"></div>
    <div class="pdf-row" id="pdfRow">
      <button class="btn btn-b" id="pdfBtn">📄 PDFで保存・印刷</button>
      <button class="btn btn-ghost" id="redoBtn">↻ 商品を選び直す</button>
    </div>
  </div>
</main>

<script>
  // ===== 商品マスタ（御社の取扱品。default=最初から載っている3品）=====
  const PRODUCTS = {
    shaft: { name:"精密シャフト", code:"SFT-50", img:"img/shaft.jpg", def:true,
      lead:"回転を支える、駆動部の心臓。",
      desc:"焼入れ・研磨による高い真円度と耐摩耗性。試作1本から量産まで一貫対応します。",
      mat:"S45C／SUS304／A5052", dim:"φ8〜φ50 × 全長300mmまで", tol:"h7（精密公差・研磨仕上げ可）",
      surface:"黒染め・無電解ニッケルメッキ", heat:"焼入焼戻し 対応", use:"モーター軸・搬送ローラー軸・各種治具シャフト",
      price:{ material:360, cutMin:10, setupLot:12000, inspectLot:6000 } },
    bush: { name:"ブッシュ（軸受）", code:"BSH-200", img:"img/bush.jpg", def:true,
      lead:"滑らかな回転を生む、縁の下の力持ち。",
      desc:"内径ボーリングと中ぐり仕上げで高精度な内径公差を実現。摺動部の摩耗・ガタつきを抑えます。",
      mat:"S45C／SUS304／A5052", dim:"φ10〜φ60 × 全長80mmまで", tol:"H7（内径公差）",
      surface:"無電解ニッケルメッキ", heat:"—", use:"軸受・スリーブ・ガイドブッシュ",
      price:{ material:110, cutMin:6, setupLot:7000, inspectLot:4000 } },
    flange: { name:"フランジ", code:"FLG-80", img:"img/flange.jpg", def:true,
      lead:"確実につなぐ、接続の要。",
      desc:"外形旋削とボルト穴加工をワンチャックで。配管・装置の接続部に。小ロットの特注寸法にも対応。",
      mat:"S45C／SUS304／A5052", dim:"φ40〜φ200 × 板厚6〜25mm", tol:"h7",
      surface:"黒染め・アルマイト", heat:"—", use:"配管接続・装置フランジ・治具ベース",
      price:{ material:320, cutMin:7, setupLot:9000, inspectLot:4000 } },
    // ---- 会場で追加できる候補（事前にプール済み）----
    collar: { name:"カラー（間座）", code:"COL-30", img:"img/collar.jpg",
      lead:"軸の位置を、ぴたりと決める。",
      desc:"止めねじ穴付きの位置決めリング。軸方向のガタを抑え、組付け精度を高めます。",
      mat:"S45C／SUS304／A5052", dim:"φ15〜φ50 × 幅10〜40mm", tol:"H7（内径）",
      surface:"黒染め・アルマイト", heat:"—", use:"軸の位置決め・スペーサー・ストッパー",
      price:{ material:90, cutMin:4, setupLot:6000, inspectLot:3000 } },
    pin: { name:"ノックピン（精密）", code:"PIN-08", img:"img/pin.jpg",
      lead:"小さくても、位置決めの主役。",
      desc:"焼入れ研磨仕上げの高精度ピン。部品同士の位置決め・芯出しを確実にします。",
      mat:"S45C／SUS304", dim:"φ3〜φ16 × 全長60mmまで", tol:"m6（外径・研磨）",
      surface:"無電解ニッケルメッキ", heat:"焼入焼戻し 対応", use:"金型・治具の位置決め・芯出し",
      price:{ material:40, cutMin:3.5, setupLot:5000, inspectLot:3000 } },
    joint: { name:"ジョイント（軸継手）", code:"JNT-40", img:"img/joint.jpg",
      lead:"二本の軸を、一本のように。",
      desc:"内径・クランプ溝を高精度加工。回転を確実に伝達し、芯ズレを吸収します。",
      mat:"S45C／SUS304／A5052", dim:"φ20〜φ60 × 全長80mmまで", tol:"H7（内径）",
      surface:"無電解ニッケルメッキ", heat:"—", use:"モーターと軸の連結・搬送装置の継手",
      price:{ material:280, cutMin:9, setupLot:10000, inspectLot:5000 } },
    gear: { name:"平歯車（ブランク）", code:"GER-32", img:"img/gear.jpg",
      lead:"動力を、なめらかに伝える。",
      desc:"外周歯切り・中心ボア加工に対応。試作・補修用の小ロット歯車を1個から製作します。",
      mat:"S45C／SUS304", dim:"φ30〜φ120・モジュール1〜3", tol:"h7（ボア）",
      surface:"黒染め", heat:"焼入焼戻し 対応", use:"減速機・搬送装置・装置補修用の歯車",
      price:{ material:300, cutMin:9, setupLot:10000, inspectLot:5000 } },
    pulley: { name:"タイミングプーリー", code:"PUL-60", img:"img/pulley.jpg",
      lead:"回転を、確実に伝える。",
      desc:"歯付きベルト用のプーリー。外径・歯形を高精度に加工し、回転とタイミングを正確に伝えます。",
      mat:"S45C／A5052", dim:"φ20〜φ100・歯数12〜60", tol:"h7（ボア）",
      surface:"黒染め・アルマイト", heat:"—", use:"搬送・駆動部のベルト伝動",
      price:{ material:340, cutMin:11, setupLot:11000, inspectLot:5000 } },
    housing: { name:"軸受ハウジング", code:"HSG-90", img:"img/housing.jpg",
      lead:"軸受を、しっかり納める。",
      desc:"ベアリングを収める筐体部品。内径の真円度と同軸度を確保し、回転を安定させます。",
      mat:"S45C／A5052", dim:"φ50〜φ150", tol:"H7（内径）",
      surface:"黒染め・アルマイト", heat:"—", use:"回転軸の支持・装置の軸受部",
      price:{ material:520, cutMin:13, setupLot:13000, inspectLot:6000 } },
    nozzle: { name:"精密ノズル", code:"NZL-12", img:"img/nozzle.jpg",
      lead:"流れを、細やかに操る。",
      desc:"液体・気体の噴射口部品。微細な穴径と内面仕上げで、安定した噴霧・流量を実現します。",
      mat:"SUS304／黄銅", dim:"φ8〜φ30・噴口φ0.5〜φ3", tol:"精密公差",
      surface:"—", heat:"—", use:"洗浄・塗装・冷却装置の噴射口",
      price:{ material:260, cutMin:12, setupLot:12000, inspectLot:6000 } },
  };
  const PROD_KEYS = Object.keys(PRODUCTS);
  // 追加候補4品は「テンプレート」として扱う（商品選択リストには出さず、登録フォームの雛形にする）
  ["collar","pin","joint","gear","pulley","housing","nozzle"].forEach(k=>{ if(PRODUCTS[k]) PRODUCTS[k].tpl=true; });
  // 会場で登録した商品（自由入力ぶん）を保持
  const CUSTOM_KEY = "catalog_custom";
  let custom; try{ custom = JSON.parse(localStorage.getItem(CUSTOM_KEY)||"{}")||{}; }catch(e){ custom={}; }
  function saveCustom(){ localStorage.setItem(CUSTOM_KEY, JSON.stringify(custom)); }
  Object.keys(custom).forEach(k=>{ if(!PRODUCTS[k]){ PRODUCTS[k]=custom[k]; PROD_KEYS.push(k); } });

  // ===== 価格ロジック（②見積AIの値付けルールを流用。ネット不要・確実）=====
  const RATE = 75;            // 加工チャージ 円/分（旋盤・フライス 約4,500円/時の実態相場）
  const OVERHEAD = 0.10, PROFIT = 0.25;
  const TIERS = [{min:500,rate:0.10},{min:100,rate:0.05},{min:50,rate:0.03},{min:0,rate:0}];
  const PRICE_COLS = [{q:5,label:"1〜9個"},{q:30,label:"10〜99個"},{q:200,label:"100〜499個"},{q:1000,label:"500個〜"}];
  function tierOf(qty){ for(const t of TIERS){ if(qty>=t.min) return t; } return {min:0,rate:0}; }
  function unitPrice(p, qty){
    if(p.unitBase){   // 自由入力で目安価格を入れた商品＝その単価をベースに、まとめると少し安く
      const f = qty>=500?0.88 : qty>=100?0.93 : qty>=50?0.96 : 1;
      return Math.round(p.unitBase*f/10)*10;
    }
    const mat = p.price.material*qty, cut = p.price.cutMin*RATE*qty;
    const base = mat + cut + p.price.inspectLot + p.price.setupLot;
    const disc = tierOf(qty).rate * (mat + cut);
    const sub = base - disc;
    const oh = sub*OVERHEAD, prof = (sub+oh)*PROFIT;
    const unit = (sub + oh + prof) / qty;
    return Math.round(unit/10)*10;   // 10円単位に丸め
  }
  const yen = n => "¥" + Math.round(Number(n)).toLocaleString("ja-JP");
  const esc = s => String(s==null?"":s).replace(/[&<>]/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;" }[m]));
  const escA = s => esc(s).replace(/"/g,"&quot;");

  // ===== カタログ描画 =====
  function imgTag(src, cls, alt){ return `<img class="${cls}" src="${escA(src)}" alt="${escA(alt||"")}" onerror="this.classList.add('noimg');this.removeAttribute('src');this.textContent='${esc(alt||"")}'">`; }
  const chunk = (arr,n)=>{ const o=[]; for(let i=0;i<arr.length;i+=n) o.push(arr.slice(i,i+n)); return o; };

  function specTable(p){
    const rows = [["対応材質",p.mat],["標準寸法",p.dim],["公差・精度",p.tol],["表面処理",p.surface],["熱処理",p.heat],["主な用途",p.use]];
    const body = rows.filter(([l,val])=>val && val!=="—").map(([l,val])=>`<tr><th>${l}</th><td>${esc(val)}</td></tr>`).join("");

  }
  function prodBlock(k){

    return `<div class="prod">

  function pgFoot(n,total){ return `<div class="pg-foot"><span>${esc(company.name)}　商品カタログ</span><span>${n} / ${total}</span></div>`; }

  function buildPages(){

        <div class="str"><div class="ico">🛠️</div><h3>一貫加工</h3><p>旋盤・フライス・マシニングから検査まで自社一貫。工程をまたぐ手間とコストを抑えます。</p></div>

    // 標準価格表
    const priceRows = selected.map(k=>{

      return `<tr><td class="it">${esc(p.name)}<small>${sub}</small></td>
        ${PRICE_COLS.map(col=>`<td class="num">${yen(unitPrice(p,col.q))}</td>`).join("")}</tr>`;
    }).join("");
    pages.push(`<section class="cat-page">
      <div class="pg-head"><span class="ja">標準価格表</span><span class="en">PRICE LIST</span></div>
      <p class="pricelead">標準材質 S45C・標準仕様での1個あたり目安単価です。<b>数量がまとまるほど単価が下がります。</b></p>
      <table class="price"><thead><tr><th>品名</th>${PRICE_COLS.map(c=>`<th>${esc(c.label)}<br><small style="font-weight:400;color:#94a3b8">単価</small></th>`).join("")}</tr></thead>
        <tbody>${priceRows}</tbody></table>
      <div class="price-note">
        ※ 上記は標準材質 S45C・標準仕様での目安単価（税抜）です。SUS304・アルミ、表面処理・熱処理、特急などは別途お見積もりいたします。<br>
        ※ 寸法・公差・数量により単価は変動します。正式金額はお見積もりにてご提示します。
      </div>
      ${pgFoot(3+groups.length, totalPages())}
    </section>`);
    // 裏表紙
    pages.push(`<section class="cat-page">
      <div class="back">
        <div class="bname">${esc(c.name)}</div>
        <div class="bmotto">${esc(c.motto)}</div>
        <dl class="back-grid">
          <dt>所在地</dt><dd>${esc(c.zip)} ${esc(c.location)}</dd>
          <dt>電話</dt><dd>${esc(c.tel)}</dd>
          <dt>Web</dt><dd>${esc(c.web)}</dd>
          <dt>登録番号</dt><dd>${esc(c.invoice)}（インボイス）</dd>

  function totalPages(){ return 2 + chunk(selected,2).length + 2; } // 表紙+強み + 製品 + 価格表+裏表紙

  function renderCatalog(){
    document.getElementById("catalog").innerHTML = buildPages().join("");
  }

  // 新しい商品を追加するフォーム（テンプレで一発 or わかる項目だけ入力）
  function renderAddbar(){
    // テンプレは「まだカタログに入っていない商品」だけを候補にする（同名がカタログにあれば除外）
    const inCatalogNames = new Set(selected.map(sk=>PRODUCTS[sk] && PRODUCTS[sk].name).filter(Boolean));
    const tpls = PROD_KEYS.filter(k=>PRODUCTS[k].tpl && !inCatalogNames.has(PRODUCTS[k].name));
    const tplOpts = tpls.length
      ? `<select id="af_tpl"><option value="">― 自分で入力する ―</option>${tpls.map(k=>`<option value="${k}">${esc(PRODUCTS[k].name)}（${esc(PRODUCTS[k].code)}）</option>`).join("")}</select>`
      : `<select id="af_tpl"><option value="">― 自分で入力する ―</option></select><div class="cc-label" style="margin-top:4px">テンプレートはすべて追加済みです。下の項目に入力して登録できます。</div>`;
    document.getElementById("addform").innerHTML = `
      <div class="aff full"><label>① テンプレートから選ぶ（おすすめ・選ぶと全部 自動で入ります）</label>
        ${tplOpts}</div>
      <div class="aff full"><label>商品の名前 <span class="unit">必須</span></label><input id="af_name" placeholder="例：精密カラー"></div>
      <div class="aff full"><label>キャッチコピー（任意・カタログの見出しに使います）</label><input id="af_lead" placeholder="例：軸の位置を、ぴたりと決める部品です。"></div>
      <div class="aff full"><label>商品の説明（任意・どんな商品かを一言）</label><input id="af_desc" placeholder="例：機械の軸の位置を固定する、小さなリング状の部品です。"></div>
      <div class="aff"><label>品番（任意）</label><input id="af_code" placeholder="例：COL-30"></div>
      <div class="aff"><label>材質（任意・わかれば）</label><input id="af_mat" placeholder="例：鉄・ステンレス"></div>
      <div class="aff"><label>大きさ（任意・わかれば）</label><input id="af_dim" placeholder="例：直径2〜5cmくらい"></div>
      <div class="aff"><label>使いみち（任意）</label><input id="af_use" placeholder="例：機械の部品の固定"></div>
      <div class="aff"><label>1個あたりの目安価格 <span class="unit">円・任意</span></label><input id="af_price" type="number" min="0" placeholder="例：1000"></div>
      <div class="afact"><button class="btn btn-o" id="afReg">＋ この商品をカタログに追加</button><span class="afmsg" id="afMsg"></span></div>`;
    document.getElementById("af_tpl").addEventListener("change", e=>fillTemplate(e.target.value));
    document.getElementById("afReg").addEventListener("click", registerProduct);
    document.getElementById("addbar").classList.add("show");
  }
  function fillTemplate(k){
    const set=(id,val)=>{ const el=document.getElementById(id); if(el) el.value=val; };
    if(!k){ ["af_name","af_lead","af_desc","af_code","af_mat","af_dim","af_use","af_price"].forEach(id=>set(id,"")); return; }
    const p = PRODUCTS[k];
    set("af_name",p.name); set("af_code",p.code); set("af_mat",p.mat); set("af_dim",p.dim);
    set("af_use",p.use); set("af_lead",p.lead||""); set("af_desc",p.desc||"");
  }
  function registerProduct(){
    if(genBusy) return;   // 演出中の連打による二重登録を防ぐ
    const v = id=>document.getElementById(id).value.trim();
    const name = v("af_name"), msg = document.getElementById("afMsg");
    if(!name){ msg.style.color="#dc2626"; msg.textContent="商品の名前を入力してください"; return; }
    const tpl = document.getElementById("af_tpl").value;
    const base = tpl ? JSON.parse(JSON.stringify(PRODUCTS[tpl])) : {};
    const key = "custom_" + Date.now().toString(36);
    const p = {
      name,
      code: v("af_code") || base.code || "—",
      img:  tpl ? base.img : "img/generic.jpg",          // テンプレ＝専用写真／自由入力＝汎用イメージ
      lead: v("af_lead") || base.lead || "",
      desc: v("af_desc") || base.desc || "",
      mat:  v("af_mat")  || base.mat  || "",
      dim:  v("af_dim")  || base.dim  || "",
      use:  v("af_use")  || base.use  || "",
      tol:  base.tol, surface: base.surface, heat: base.heat   // 専門項目はテンプレから来たぶんだけ
    };
    if(tpl){ p.price = base.price; }                       // テンプレ＝原価モデルで自動価格
    else { p.unitBase = Number(v("af_price")) || 1000; }   // 自由入力＝入れた目安価格（空なら¥1,000）
    PRODUCTS[key] = p; PROD_KEYS.push(key); custom[key]=p; saveCustom();
    if(!selected.includes(key)) selected.push(key);
    saveSel(); renderPicker(); msg.style.color=""; msg.textContent="";
    runGen({ quick:true, added:name });
  }
  // カタログから商品を消す（重複・不要品の削除）
  function removeProduct(k){
    if(genBusy) return;
    selected = selected.filter(x=>x!==k);
    if(custom[k]){ delete custom[k]; saveCustom(); }   // 自由入力で作った商品は保存先からも消す
    saveSel(); renderPicker(); renderCatalog(); renderAddbar();
    const st=document.getElementById("status"); st.className="status done";
    st.textContent = `商品を1つ消しました（残り ${selected.length}品）`;
  }

  // ===== 生成演出（その場で組み上がる・約10秒／追加は約4秒）=====
  const GEN_STEPS = [
    "📦 御社の取扱品の情報を読み込んでいます…",
    "✍️ 各商品の特長・用途を文章にまとめています…",
    "🧮 値付けルールから標準価格表を計算しています…",
    "🎨 カタログのデザインに配置しています…",
  ];
  const GEN_STEP_MS = 2500;
  let genBusy = false;
  function runGen(opt={}){
    if(genBusy) return;
    if(!selected.length){ document.getElementById("status").textContent="商品を1つ以上 選んでください"; return; }
    genBusy = true;
    const steps = opt.quick ? [`➕ ${opt.added} をカタログに組み込んでいます…`, "🎨 レイアウトを整えています…"] : GEN_STEPS;
    const stepMs = opt.quick ? 2000 : GEN_STEP_MS;
    const status = document.getElementById("status");
    const btn = document.getElementById("genBtn"); btn.disabled = true; btn.style.opacity = .6;
    if(!opt.quick){ document.getElementById("result").classList.remove("show"); document.getElementById("pdfRow").classList.remove("show"); document.getElementById("addbar").classList.remove("show"); }
    let i = 0;
    (function step(){
      status.className = "status"; status.textContent = steps[i]; i++;
      setTimeout(i < steps.length ? step : finish, stepMs);
    })();
    function finish(){
      renderCatalog();
      document.getElementById("result").classList.add("show");
      document.getElementById("pdfRow").classList.add("show");
      renderAddbar();
      status.className = "status done";
      status.textContent = opt.quick ? `✓ ${opt.added} を追加しました（全${selected.length}品）` : `✓ 商品カタログを作成しました（全${selected.length}品・${totalPages()}ページ）`;
      if(opt.quick){
        const blocks=[...document.querySelectorAll(".prod-name")];
        const hit=blocks.find(n=>n.textContent.indexOf(opt.added)>=0);
        (hit?hit.closest(".prod"):document.getElementById("result")).scrollIntoView({ behavior:"smooth", block:"center" });
      } else {
        document.getElementById("result").scrollIntoView({ behavior:"smooth", block:"start" });
      }
      btn.disabled = false; btn.style.opacity = 1; genBusy = false;
    }
  }

  // ===== 会社設定パネル（①②と同じ作法）=====

  function doRedo(){
    document.getElementById("result").classList.remove("show");
    document.getElementById("pdfRow").classList.remove("show");
    document.getElementById("addbar").classList.remove("show");
    document.getElementById("status").textContent=""; window.scrollTo({top:0,behavior:"smooth"});
  }
  document.getElementById("catalog").addEventListener("click", e=>{
    const b = e.target.closest(".prod-del"); if(b) removeProduct(b.dataset.k);
  });
  document.getElementById("pdfBtn").addEventListener("click", doPrint);
  document.getElementById("pdfBtnTop").addEventListener("click", doPrint);
  document.getElementById("redoBtn").addEventListener("click", doRedo);
  document.getElementById("redoBtnTop").addEventListener("click", doRedo);

  // 初期化
  renderPicker(); renderCompany();
</script>
</body>
